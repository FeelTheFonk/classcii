# config/default.toml — Configuration clasSCII par défaut (SOTA Fidelity).

[render]
render_mode = "Ascii"
charset_index = 0
color_enabled = true
color_mode = "HsvBright"
dither_mode = "BlueNoise16"
density_scale = 4.0
contrast = 1.3
brightness = 0.3
saturation = 1.3
edge_threshold = 0.3
edge_mix = 0.6
aspect_ratio = 2.5
bg_style = "SourceDim"
fade_decay = 0.03
glow_intensity = 0.2
beat_flash_intensity = 0.2
temporal_stability = 0.3
target_fps = 60

[audio]
sensitivity = 1.2
smoothing = 0.5

[[audio.mappings]]
enabled = true
source = "bass"
target = "edge_threshold"
amount = 0.4
curve = "Exponential"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "contrast"
amount = 0.4
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.2
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "onset_envelope"
target = "beat_flash_intensity"
amount = 0.5
curve = "Smooth"
