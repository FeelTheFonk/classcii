# config/default.toml — Configuration clasSCII par défaut (SOTA Fidelity).

[render]
render_mode = "Octant"
charset_index = 0
charset = " .'`^\",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$"
density_scale = 1.0
invert = false
color_enabled = true
color_mode = "Oklab"                 # Direct, HsvBright, Oklab, Quantized
dither_mode = "BlueNoise16"          # Bayer8x8, BlueNoise16, None
edge_threshold = 0.0
edge_mix = 0.3                       # >0 requis pour que bass→edge_threshold soit visible
shape_matching = false
aspect_ratio = 2.0
saturation = 1.0
contrast = 1.0
brightness = 0.0
bg_style = "Black"                   # Black, SourceDim, Transparent

# Virtual Camera
camera_zoom_amplitude = 1.0
camera_rotation = 0.0
camera_pan_x = 0.0
camera_pan_y = 0.0

# Post-processing effects
fade_decay = 0.0
glow_intensity = 0.0
beat_flash_intensity = 0.0         # Strobe envelope intensity
chromatic_offset = 0.0             # R/B channel offset (0 = off)
wave_amplitude = 0.0               # Sinusoidal row shift (0 = off)
wave_speed = 0.0                   # Wave oscillation speed (active when amplitude > 0)
color_pulse_speed = 0.0            # HSV hue rotation speed (0 = off)
scanline_gap = 0                   # Darken every Nth row (0 = off)
strobe_decay = 0.85                # Strobe decay rate per frame
temporal_stability = 0.3           # Anti-flicker strength (0 = off)
zalgo_intensity = 0.0              # Zalgo diacritics intensity (0 = off)

# Display
target_fps = 60
fullscreen = false
show_spectrum = false

[audio]
smoothing = 0.3                    # Mapping-level EMA (feature-level smooth already applied)
sensitivity = 1.5                  # Global multiplier for all mapping deltas

# Audio-reactive mappings

[[audio.mappings]]
enabled = true
source = "bass"
target = "edge_threshold"
amount = 0.5
offset = 0.0
curve = "Exponential"              # Suppress noise, amplify peaks

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "contrast"
amount = 0.6
offset = 0.0
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.25
offset = 0.0
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "beat_intensity"
target = "beat_flash_intensity"
amount = 0.8
offset = 0.0
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "glow_intensity"
amount = 0.5
offset = 0.0
curve = "Linear"
