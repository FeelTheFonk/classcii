# 01_pure_photo — Maximum fidelity Octant rendering, Oklab perceptual color.
# Faithful reproduction of the source with near-imperceptible audio breathing.

[render]
render_mode = "Octant"
color_enabled = true
color_mode = "Oklab"
dither_mode = "BlueNoise16"
density_scale = 1.0
contrast = 1.0
brightness = 0.0
saturation = 1.0
aspect_ratio = 2.0
bg_style = "Black"
temporal_stability = 0.3
target_fps = 60

[audio]
sensitivity = 0.8
smoothing = 0.8

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.15
curve = "Linear"
