# 01_pure_photo — Maximum fidelity Octant rendering, Oklab perceptual color.
# Faithful reproduction of the source with subtle audio breathing.

[render]
render_mode = "Braille"
color_enabled = false
color_mode = "Oklab"
dither_mode = "BlueNoise16"
density_scale = 4.0
contrast = 1.0
brightness = 0.0
saturation = 1.0
aspect_ratio = 2.0
bg_style = "Black"
temporal_stability = 0.3
target_fps = 60

[audio]
sensitivity = 1.8
smoothing = 0.5

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.5
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "contrast"
amount = 0.4
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "bass"
target = "glow_intensity"
amount = 0.35
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "onset_envelope"
target = "beat_flash_intensity"
amount = 0.3
curve = "Smooth"
