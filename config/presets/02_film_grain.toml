# 02_film_grain — Cinematic Sextant rendering with organic film texture.
# Oklab perceptual color, subtle fade and temporal stability, gentle reactivity.

[render]
render_mode = "Sextant"
color_enabled = true
color_mode = "Oklab"
dither_mode = "BlueNoise16"
density_scale = 1.2
contrast = 1.15
brightness = 0.0
saturation = 1.1
edge_threshold = 0.15
edge_mix = 0.2
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.15
temporal_stability = 0.4
target_fps = 60

[audio]
sensitivity = 1.0
smoothing = 0.4

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.5
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "saturation"
amount = 0.5
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "bass"
target = "glow_intensity"
amount = 0.5
offset = 0.2
curve = "Exponential"
