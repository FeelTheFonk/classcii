# 03_soft_focus — Photographic soft focus with gentle bloom.
# HsvBright for vibrant tones, high-density Octant rendering.

[render]
render_mode = "Braille"
color_enabled = true
color_mode = "HsvBright"
dither_mode = "BlueNoise16"
density_scale = 3.0
contrast = 1.1
brightness = 0.15
saturation = 1.3
aspect_ratio = 2.0
bg_style = "Black"
glow_intensity = 0.5
fade_decay = 0.2
temporal_stability = 0.5
target_fps = 60

[audio]
sensitivity = 1.3
smoothing = 0.35

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "brightness"
amount = 0.4
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "timbral_brightness"
target = "saturation"
amount = 0.45
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "rms"
target = "glow_intensity"
amount = 0.4
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "onset_envelope"
target = "fade_decay"
amount = 0.3
curve = "Smooth"
