# 03_soft_focus — Photographic soft focus with gentle bloom.
# Shape matching for structural fidelity, HsvBright for vibrant tones.

[render]
render_mode = "Octant"
color_enabled = true
color_mode = "HsvBright"
dither_mode = "BlueNoise16"
density_scale = 0.9
contrast = 1.1
brightness = 0.15
saturation = 1.3
shape_matching = true
edge_threshold = 0.2
edge_mix = 0.4
aspect_ratio = 2.0
bg_style = "Black"
glow_intensity = 0.5
fade_decay = 0.2
temporal_stability = 0.5
target_fps = 60

[audio]
sensitivity = 1.0
smoothing = 0.6

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "brightness"
amount = 0.2
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "timbral_brightness"
target = "saturation"
amount = 0.3
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "rms"
target = "glow_intensity"
amount = 0.25
curve = "Smooth"
