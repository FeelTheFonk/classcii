# 04_noir — Classic film noir. Monochrome, high contrast, edge-dominant.
# Light and shadow drama with shape matching for structural integrity.

[render]
render_mode = "HalfBlock"
color_enabled = false
dither_mode = "None"
density_scale = 1.0
contrast = 2.0
brightness = -0.1
saturation = 0.0
shape_matching = true
edge_threshold = 0.5
edge_mix = 0.8
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.7
glow_intensity = 0.3
temporal_stability = 0.4
target_fps = 30
show_spectrum = false

[audio]
sensitivity = 1.0
smoothing = 0.7

[[audio.mappings]]
enabled = true
source = "rms"
target = "glow_intensity"
amount = 0.3
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "edge_mix"
amount = 0.2
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "onset_envelope"
target = "brightness"
amount = 0.25
curve = "Smooth"
