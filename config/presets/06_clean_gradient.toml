# 06_clean_gradient — Versatile reference preset. Works well with everything.
# Full charset, SourceDim background, balanced audio reactivity.

[render]
render_mode = "Ascii"
charset_index = 0
color_enabled = true
color_mode = "HsvBright"
dither_mode = "BlueNoise16"
density_scale = 1.0
contrast = 1.2
brightness = 0.0
saturation = 1.2
edge_threshold = 0.2
edge_mix = 0.4
aspect_ratio = 2.0
bg_style = "SourceDim"
fade_decay = 0.25
glow_intensity = 0.4
beat_flash_intensity = 0.3
temporal_stability = 0.3
target_fps = 60

[audio]
sensitivity = 1.2
smoothing = 0.5

[[audio.mappings]]
enabled = true
source = "bass"
target = "edge_threshold"
amount = 0.4
curve = "Exponential"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "contrast"
amount = 0.4
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.25
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "onset_envelope"
target = "beat_flash_intensity"
amount = 0.5
curve = "Smooth"
