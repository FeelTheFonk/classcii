# 07_sextant_cinema — Cinematic Sextant with subtle audio-driven camera.
# Oklab perceptual color, filmic glow, bass-reactive zoom.

[render]
render_mode = "Sextant"
color_enabled = true
color_mode = "Oklab"
dither_mode = "BlueNoise16"
density_scale = 1.3
contrast = 1.2
brightness = 0.0
saturation = 1.15
edge_threshold = 0.2
edge_mix = 0.3
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.5
glow_intensity = 0.35
temporal_stability = 0.35
camera_zoom_amplitude = 1.0
target_fps = 60

[audio]
sensitivity = 1.3
smoothing = 0.65

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.5
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "saturation"
amount = 0.5
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "bass"
target = "camera_zoom_amplitude"
amount = 0.5
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "peak"
target = "edge_mix"
amount = 0.5
curve = "Smooth"
