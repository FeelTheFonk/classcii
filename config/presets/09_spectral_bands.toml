# 09_spectral_bands — Each frequency band drives a distinct visual effect.
# Educational and spectacular: sub_bass->wave, low_mid->fade, high_mid->chromatic,
# presence->glow, brilliance->color_pulse.

[render]
render_mode = "Quadrant"
color_enabled = true
color_mode = "Oklab"
dither_mode = "Bayer8x8"
density_scale = 1.8
contrast = 1.15
brightness = 0.0
saturation = 1.3
aspect_ratio = 2.0
bg_style = "SourceDim"
fade_decay = 0.25
glow_intensity = 0.3
temporal_stability = 0.4
target_fps = 60

[audio]
sensitivity = 1.2
smoothing = 0.5

[[audio.mappings]]
enabled = true
source = "sub_bass"
target = "wave_amplitude"
amount = 0.42
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "low_mid"
target = "fade_decay"
amount = 0.42
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "high_mid"
target = "chromatic_offset"
amount = 0.42
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "presence"
target = "glow_intensity"
amount = 0.50
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "brilliance"
target = "color_pulse_speed"
amount = 0.56
curve = "Smooth"
