# 10_vector_wire — Monochrome wireframe, edge-dominant rendering.
# Pure structural lines, onset→invert for dramatic beat impacts.

[render]
render_mode = "Ascii"
charset = ".,*+#@"
color_enabled = false
dither_mode = "Bayer8x8"
density_scale = 4.0
contrast = 1.8
brightness = 0.0
saturation = 0.0
edge_threshold = 0.5
edge_mix = 1.0
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.9
glow_intensity = 0.4
beat_flash_intensity = 0.3
temporal_stability = 0.5
target_fps = 60

[audio]
sensitivity = 2.0
smoothing = 0.7

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "edge_threshold"
amount = 0.5
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "onset"
target = "invert"
amount = 0.8
curve = "Threshold"

[[audio.mappings]]
enabled = true
source = "rms"
target = "contrast"
amount = 0.4
curve = "Linear"
