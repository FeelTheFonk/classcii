# 11_deep_zoom â€” Audio-reactive camera: bassâ†’zoom, centroidâ†’rotation.
# Immersive spatial experience with high-density Braille pointillism.

[render]
render_mode = "Braille"
color_enabled = true
color_mode = "Direct"
dither_mode = "BlueNoise16"
density_scale = 2.5
contrast = 1.15
brightness = 0.0
saturation = 1.15
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.4
glow_intensity = 0.5
color_pulse_speed = 0.4
temporal_stability = 0.25
camera_zoom_amplitude = 1.0
camera_rotation = 0.0
target_fps = 60

[audio]
sensitivity = 1.0
smoothing = 0.55

[[audio.mappings]]
enabled = true
source = "bass"
target = "camera_zoom_amplitude"
amount = 0.8
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "camera_rotation"
amount = 0.5
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "rms"
target = "glow_intensity"
amount = 0.5
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "color_pulse_speed"
amount = 0.5
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "onset_envelope"
target = "beat_flash_intensity"
amount = 0.4
curve = "Smooth"
