# 14_brutalism — Architectural monochrome brutalism. High density, strong glow.
# Fullscreen, beat-driven density modulation, onset→invert for impact.

[render]
render_mode = "Quadrant"
color_enabled = false
dither_mode = "Bayer8x8"
density_scale = 2.0
contrast = 1.5
brightness = 0.15
saturation = 0.0
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.2
glow_intensity = 1.3
beat_flash_intensity = 1.0
temporal_stability = 0.35
strobe_decay = 0.8
target_fps = 60
fullscreen = true
show_spectrum = false

[audio]
sensitivity = 1.8
smoothing = 0.3

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.4
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "beat_intensity"
target = "density_scale"
amount = 0.6
curve = "Threshold"

[[audio.mappings]]
enabled = true
source = "onset"
target = "invert"
amount = 0.8
curve = "Threshold"
