# 15_neon_edge — Neon urban aesthetic. Edge-dominant with glow and chromatic.
# Direct color for vivid neons, bass-driven brightness, timbral contrast.

[render]
render_mode = "Ascii"
charset_index = 0
color_enabled = true
color_mode = "Direct"
dither_mode = "BlueNoise16"
density_scale = 1.0
contrast = 1.8
brightness = 0.0
saturation = 1.1
edge_threshold = 0.4
edge_mix = 1.0
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.15
glow_intensity = 0.8
chromatic_offset = 0.8
wave_amplitude = 0.08
wave_speed = 1.5
color_pulse_speed = 0.4
beat_flash_intensity = 0.6
temporal_stability = 0.2
strobe_decay = 0.8
target_fps = 60

[audio]
sensitivity = 1.3
smoothing = 0.25

[[audio.mappings]]
enabled = true
source = "bass"
target = "brightness"
amount = 0.25
curve = "Exponential"

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "saturation"
amount = 0.21
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "onset_envelope"
target = "beat_flash_intensity"
amount = 0.35
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "timbral_roughness"
target = "contrast"
amount = 0.21
curve = "Smooth"
