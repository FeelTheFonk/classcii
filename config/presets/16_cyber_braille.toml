# 16_cyber_braille — Cyberpunk saturated Braille pointillism.
# HsvBright for maximum saturation, glow+chromatic+scanlines combo.

[render]
render_mode = "Braille"
color_enabled = true
color_mode = "HsvBright"
dither_mode = "BlueNoise16"
density_scale = 2.5
contrast = 1.5
brightness = 0.0
saturation = 1.7
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.5
glow_intensity = 1.2
chromatic_offset = 1.2
scanline_gap = 3
beat_flash_intensity = 0.5
temporal_stability = 0.25
strobe_decay = 0.85
target_fps = 60

[audio]
sensitivity = 1.5
smoothing = 0.3

[[audio.mappings]]
enabled = true
source = "bass"
target = "brightness"
amount = 0.4
curve = "Exponential"

[[audio.mappings]]
enabled = true
source = "onset_envelope"
target = "beat_flash_intensity"
amount = 0.5
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "contrast"
amount = 0.4
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "chromatic_offset"
amount = 0.3
curve = "Smooth"
