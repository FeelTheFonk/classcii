# 17_matrix_rain — Classic Matrix digital rain. Binary charset, long fade trails.
# HsvBright green saturation, RMS→density for breathing effect.

[render]
render_mode = "Ascii"
charset = " 01"
color_enabled = true
color_mode = "HsvBright"
dither_mode = "Bayer8x8"
density_scale = 4.0
contrast = 1.35
brightness = -0.1
saturation = 1.8
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.85
glow_intensity = 0.25
beat_flash_intensity = 0.4
strobe_decay = 0.9
target_fps = 60

[audio]
sensitivity = 1.8
smoothing = 0.4

[[audio.mappings]]
enabled = true
source = "rms"
target = "density_scale"
amount = 0.5
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "beat_intensity"
target = "brightness"
amount = 0.4
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "fade_decay"
amount = 0.15
offset = 0.7
curve = "Linear"
