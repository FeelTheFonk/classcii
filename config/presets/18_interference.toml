# 18_interference — Wave interference and moiré patterns.
# Fast wave speed, bass-driven amplitude, chromatic separation.

[render]
render_mode = "Braille"
color_enabled = true
color_mode = "Oklab"
dither_mode = "BlueNoise16"
density_scale = 1.4
contrast = 1.25
brightness = 0.0
saturation = 1.0
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.25
chromatic_offset = 0.8
wave_amplitude = 0.35
wave_speed = 6.0
scanline_gap = 3
target_fps = 60

[audio]
sensitivity = 1.3
smoothing = 0.35

[[audio.mappings]]
enabled = true
source = "bass"
target = "wave_amplitude"
amount = 0.4
curve = "Exponential"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "wave_amplitude"
amount = 0.3
curve = "Exponential"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "chromatic_offset"
amount = 0.4
curve = "Smooth"
