# 22_hires_export — Optimized for lossless batch export with --export-scale.
# CHARSET_FULL 70-char gradient, Oklab fidelity, subtle audio reactivity.
# Bass→contrast with offset 0.8 ensures always-elevated baseline.

[render]
render_mode = "Ascii"
charset_index = 0
color_enabled = true
color_mode = "Oklab"
dither_mode = "BlueNoise16"
density_scale = 4.0
contrast = 1.15
brightness = 0.0
saturation = 1.2
edge_threshold = 0.2
edge_mix = 0.3
aspect_ratio = 2.0
bg_style = "Black"
fade_decay = 0.25
glow_intensity = 0.25
temporal_stability = 0.4
target_fps = 60

[audio]
sensitivity = 1.0
smoothing = 0.4

[[audio.mappings]]
enabled = true
source = "rms"
target = "brightness"
amount = 0.3
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "spectral_centroid"
target = "saturation"
amount = 0.35
curve = "Smooth"

[[audio.mappings]]
enabled = true
source = "bass"
target = "contrast"
amount = 0.3
offset = 0.8
curve = "Linear"

[[audio.mappings]]
enabled = true
source = "spectral_flux"
target = "glow_intensity"
amount = 0.45
curve = "Smooth"
